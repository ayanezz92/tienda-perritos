name: CI/CD Tienda Perritos - DB

on:
  push:
    paths:
      - 'db/**' # Solo se activa al cambiar archivos en la carpeta db

jobs:
  build-push-deploy-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Docker Hub (Para Décimas)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build y Push Dual (Hito 1 y 2)
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPO: ${{ secrets.ECR_REPO_URL_DB }}
        run: |
          # Construir la imagen
          docker build -t tienda-db ./db
          
          # Hito 2: Subir a AWS ECR
          docker tag tienda-db $ECR_REGISTRY/$ECR_REPO:latest
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          
          # Hito 1: Subir a Docker Hub con autoría
          docker tag tienda-db ayanezz92/tienda-db:latest
          docker push ayanezz92/tienda-db:latest

      - name: Despliegue en EC2 vía SSM (Producción)
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_DB_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_URL_DB }}:latest",
              "docker stop tienda-db || true",
              "docker rm tienda-db || true",
              "docker run -d --name tienda-db -p 3306:3306 -v db_data:/var/lib/mysql ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_URL_DB }}:latest"
            ]'